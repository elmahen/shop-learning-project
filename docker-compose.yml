services:
  postgres:
    image: postgres:16-alpine
    container_name: shop_db
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/testdata.sql:/docker-entrypoint-initdb.d/02_testdata.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d shopdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
